name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ElvisGuterres
          template: classic
          base: header, activity, repositories, metadata
          config_timezone: America/Sao_Paulo
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, cmake, scss, shell, vim script, batchfile, roff, roff manpage, rich text format, jupyter notebook
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_indepth: yes
          plugin_languages_indepth_custom: ElvisGuterres/ShadowRealm, ElvisGuterres/ElevadorApisul
          plugin_languages_analysis_timeout: 60
          plugin_languages_analysis_timeout_repositories: 30
          repositories_affiliations: owner, collaborator, organization_member
          commits_authoring: ElvisGuterres, elvisjunior2002@gmail.com
